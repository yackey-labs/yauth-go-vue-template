services:
  postgres:
    image: postgres:17-alpine
    container_name: yauth-template-pg
    environment:
      POSTGRES_USER: yauth
      POSTGRES_PASSWORD: yauth
      POSTGRES_DB: yauth_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yauth -d yauth_app"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  pgdata:
