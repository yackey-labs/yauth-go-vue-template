name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: yauth
          POSTGRES_PASSWORD: yauth
          POSTGRES_DB: yauth_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yauth -d yauth_app"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20
    env:
      DATABASE_URL: postgres://yauth:yauth@127.0.0.1:5432/yauth_app?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: server/go.sum

      - name: go mod download (also fetches the task / yauth tools)
        run: go mod download
        working-directory: server

      - name: lint-server (go vet + gofmt)
        run: ./task lint-server

      - name: build-server
        run: ./task build-server

      - name: test-server
        run: ./task test-server

      - name: yauth status (validates yauth.yaml + plugin wiring)
        run: ./yauth status -c yauth.yaml

      - name: migrate via app subcommand (production-blessed entry point)
        run: ./task migrate

      - name: smoke — boot server, register + login + protected typed fetch
        run: |
          # Use a fresh shell so the DB-already-migrated path is exercised
          # and AUTO_MIGRATE doesn't redo work.
          server/server -c yauth.yaml &
          PID=$!
          trap "kill $PID 2>/dev/null || true" EXIT

          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:3000/openapi.json -o /dev/null; then break; fi
            sleep 0.5
          done

          curl -fsS -X POST http://127.0.0.1:3000/api/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"email":"smoke@example.com","password":"yauth-smoke!Aq7z"}'
          echo
          jar=$(mktemp)
          curl -fsS -c "$jar" -X POST http://127.0.0.1:3000/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"smoke@example.com","password":"yauth-smoke!Aq7z"}' -o /dev/null
          curl -fsS -b "$jar" http://127.0.0.1:3000/api/me

  web:
    name: Web (Vue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: server/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}

      - name: go mod download (fetches the task tool)
        run: go mod download
        working-directory: server

      - name: install web deps
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: lint-web
        run: ./task lint-web

      - name: typecheck
        run: ./task typecheck

      - name: build-web
        run: ./task build-web

      - name: typed client is fresh
        # Regenerates spec + orval client and fails if anything changed —
        # so server-side handler changes always ship with a regenerated
        # web/openapi.json + web/src/generated/api.ts.
        run: |
          ./task gen
          if ! git diff --quiet -- web/openapi.json web/src/generated; then
            echo "::error::generated client is stale. Run \`./task gen\` and commit the diff."
            git --no-pager diff -- web/openapi.json web/src/generated | head -200
            exit 1
          fi
